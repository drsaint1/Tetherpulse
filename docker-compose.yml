version: '3.8'

services:
  tipbot:
    build: .
    env_file: .env
    ports:
      - "${PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tipbot
      POSTGRES_PASSWORD: tipbot_dev_password
      POSTGRES_DB: tipbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tipbot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
